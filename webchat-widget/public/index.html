<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sarah Webchat — Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e0e0e0;
      }
      .card {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 16px;
        padding: 48px;
        max-width: 480px;
        text-align: center;
        backdrop-filter: blur(12px);
      }
      h1 { margin: 0 0 12px; font-size: 28px; font-weight: 700; color: #fff; }
      p  { margin: 0 0 32px; color: #aaa; line-height: 1.6; }
      code {
        display: block;
        background: rgba(0,0,0,0.4);
        border-radius: 8px;
        padding: 16px;
        font-size: 13px;
        color: #7dd3fc;
        text-align: left;
        word-break: break-all;
      }
      .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sarah Webchat</h1>
      <p>The chat widget is running. Use the button in the bottom-right corner to start a conversation.</p>
      <div class="label">Embed on any site with:</div>
      <code id="embed-snippet">Loading...</code>
    </div>

    <!-- Load the widget from this same deployment -->
    <script>
      const base = window.location.origin;
      document.getElementById('embed-snippet').textContent =
        `<link rel="stylesheet" href="${base}/sarah-webchat.css">\n<script src="${base}/sarah-webchat.iife.js"><\/script>`;
    </script>
    <link rel="stylesheet" href="./sarah-webchat.css" />
    <script src="./sarah-webchat.iife.js"></script>
  </body>
</html>
